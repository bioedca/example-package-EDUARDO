name: example
on: push
jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - name: Greeting!
        run: echo hello world
  run-python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install_packages
        run: python -m pip install -e ".[test]"

      - name: Test Install_packages
        run: python -m pytest    